backend:
  name: git-gateway
  repo: SHAVRINA/moy-sait  # ← ЗАМЕНИТЕ на свой логин и название репозитория
  branch: main
  base_url: https://oauth.decapcms.org
  auth_endpoint: oauth

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "home"
    label: "Главная страница"
    files:
      - name: "general"
        label: "Основные настройки"
        file: "content/home.json"
        fields:
          - { label: "Заголовок (H1)", name: "hero_title", widget: "string", default: "Уютный текстиль для вашего дома" }
          - { label: "Подзаголовок", name: "hero_subtitle", widget: "string", default: "SOULФЕТКА: наполним душой каждую деталь" }
          - { label: "Текст 'О нас' (1)", name: "about_soul", widget: "text" }
          - { label: "Текст 'О нас' (2)", name: "about_fetka", widget: "text" }
          - { label: "Текст 'О нас' (3)", name: "about_extra1", widget: "text" }
          - { label: "Текст 'О нас' (4)", name: "about_extra2", widget: "text" }
          - { label: "Текст 'О нас' (5)", name: "about_extra3", widget: "text" }
          - label: "Преимущества (4 карточки)"
            name: "advantages"
            widget: "list"
            fields:
              - { label: "Заголовок", name: "title", widget: "string" }
              - { label: "Описание", name: "desc", widget: "text" }
          - label: "Вопросы и ответы (FAQ)"
            name: "faq"
            widget: "list"
            fields:
              - { label: "Вопрос", name: "question", widget: "string" }
              - { label: "Ответ", name: "answer", widget: "text" }
          - { label: "Телефон", name: "phone", widget: "string" }
          - { label: "Адрес", name: "address", widget: "string" }
          - { label: "Ссылка Telegram", name: "telegram", widget: "string" }
          - { label: "Ссылка Instagram", name: "instagram", widget: "string" }
          - { label: "Ссылка WhatsApp", name: "whatsapp", widget: "string" }
          - { label: "Логотип", name: "logo", widget: "image" }
          - { label: "Фото интерьера", name: "interior_image", widget: "image" }

  - name: "products"
    label: "Товары"
    files:
      - name: "list"
        label: "Список товаров"
        file: "content/products.json"
        fields:
          - label: "Товары"
            name: "items"
            widget: "list"
            fields:
              - { label: "Артикул (ID)", name: "id", widget: "number" }
              - { label: "Название", name: "title", widget: "string" }
              - { label: "Описание", name: "description", widget: "text" }
              - { label: "Цена (руб)", name: "price", widget: "number" }
              - label: "Категория"
                name: "category"
                widget: "select"
                options:
                  - { label: "Салфетки", value: "napkins" }
                  - { label: "Скатерти", value: "tablecloths" }
                  - { label: "Прочее", value: "other" }
              - { label: "Изображение", name: "image", widget: "image" }
              - { label: "В наличии", name: "in_stock", widget: "boolean", default: true }